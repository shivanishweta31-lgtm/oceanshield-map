<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OceanShield Global — Operational Footprint</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy: #07111f;
  --navy2: #0b1a2e;
  --navy3: #0f2440;
  --panel: #091828;
  --border: rgba(255,255,255,0.07);
  --blue: #2e86de;
  --teal: #1dd1a1;
  --amber: #feca57;
  --purple: #a29bfe;
  --pink: #fd79a8;
  --text: #c8dff0;
  --muted: #4a7a9b;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--navy);color:var(--text);font-family:var(--font-body)}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;height:56px;
  background:rgba(7,17,31,0.97);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;backdrop-filter:blur(8px);
}
#logo{display:flex;align-items:center;gap:12px}
#logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#0f3460,#1a5fa0);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#logo-text .name{font-family:var(--font-head);font-size:18px;font-weight:700;color:#e8f4ff;letter-spacing:.04em}
#logo-text .sub{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
#nav-filters{display:flex;gap:6px;align-items:center}
#nav-filters span{font-size:11px;color:var(--muted);margin-right:4px;text-transform:uppercase;letter-spacing:.06em}
.fbtn{
  font-family:var(--font-body);font-size:11px;font-weight:500;
  padding:5px 13px;border-radius:20px;border:1px solid rgba(255,255,255,0.12);
  background:transparent;color:var(--muted);cursor:pointer;
  transition:all .15s;white-space:nowrap;letter-spacing:.02em;
}
.fbtn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.fbtn.active{border-color:currentColor;color:#fff}
.fbtn[data-id="all"].active{color:#fff;border-color:rgba(255,255,255,0.4)}
.fbtn[data-id="uae"].active{color:var(--blue);border-color:var(--blue);background:rgba(46,134,222,0.1)}
.fbtn[data-id="sg"].active{color:var(--teal);border-color:var(--teal);background:rgba(29,209,161,0.1)}
.fbtn[data-id="in"].active{color:var(--amber);border-color:var(--amber);background:rgba(254,202,87,0.1)}
.fbtn[data-id="no"].active{color:var(--purple);border-color:var(--purple);background:rgba(162,155,254,0.1)}
.fbtn[data-id="gh"].active{color:var(--pink);border-color:var(--pink);background:rgba(253,121,168,0.1)}
#reset-btn{
  font-size:11px;padding:5px 10px;background:transparent;
  border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer;
  font-family:var(--font-body);transition:all .15s;
}
#reset-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}

/* LAYOUT */
#layout{display:flex;height:100vh;padding-top:56px}
#map-wrap{flex:1;position:relative;overflow:hidden;background:var(--navy)}
#map-wrap svg{display:block;width:100%;height:100%}

/* SIDE PANEL */
#side{
  width:280px;flex-shrink:0;background:var(--panel);
  border-left:1px solid var(--border);display:flex;flex-direction:column;
  overflow:hidden;
}
#side-header{padding:16px 18px 12px;border-bottom:1px solid var(--border)}
#side-header .sh-title{font-family:var(--font-head);font-size:13px;font-weight:600;color:#e8f4ff;text-transform:uppercase;letter-spacing:.08em}
#side-header .sh-count{font-size:11px;color:var(--muted);margin-top:2px}
#port-search{
  padding:10px 18px;border-bottom:1px solid var(--border);
}
#port-search input{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;
  font-family:var(--font-body);outline:none;
}
#port-search input::placeholder{color:var(--muted)}
#port-search input:focus{border-color:rgba(255,255,255,0.2)}
#port-list{flex:1;overflow-y:auto;padding:8px 0}
#port-list::-webkit-scrollbar{width:3px}
#port-list::-webkit-scrollbar-track{background:transparent}
#port-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

.port-item{
  display:flex;align-items:center;gap:10px;padding:8px 18px;
  cursor:pointer;transition:background .12s;border-bottom:1px solid rgba(255,255,255,0.03);
}
.port-item:hover{background:rgba(255,255,255,0.04)}
.port-item.active{background:rgba(255,255,255,0.07)}
.pi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pi-info{flex:1;min-width:0}
.pi-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-office{font-size:10px;color:var(--muted);margin-top:1px}
.pi-badge{font-size:9px;padding:2px 7px;border-radius:3px;flex-shrink:0;font-weight:500}

/* DETAIL PANEL */
#detail-panel{
  position:absolute;top:72px;right:296px;width:300px;
  background:rgba(9,24,40,0.97);border:1px solid var(--border);
  border-radius:12px;backdrop-filter:blur(12px);padding:18px;
  display:none;z-index:50;
}
#detail-panel.visible{display:block}
#dp-close{position:absolute;top:12px;right:12px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1}
#dp-close:hover{color:var(--text)}
#dp-color-bar{height:3px;border-radius:2px;margin-bottom:14px}
#dp-title{font-family:var(--font-head);font-size:17px;font-weight:700;color:#e8f4ff;margin-bottom:2px}
#dp-subtitle{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
#dp-type{font-size:11px;padding:3px 9px;border-radius:4px;display:inline-block;margin-bottom:12px;font-weight:500}
#dp-body{font-size:12px;color:var(--muted);line-height:1.8}
#dp-services{margin-top:12px}
#dp-services .ds-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.svc-tag{display:inline-block;font-size:10px;padding:3px 8px;border-radius:4px;margin:2px 2px 0 0;border:0.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6)}
#dp-ports-section{margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
#dp-ports-section .dp-pl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
#dp-ports-list{font-size:11px;color:var(--text);line-height:2;max-height:140px;overflow-y:auto}
#dp-ports-list::-webkit-scrollbar{width:2px}
#dp-ports-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1)}

/* STATS BAR */
#stats-bar{
  position:fixed;bottom:0;left:0;right:280px;
  background:rgba(7,17,31,0.97);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;height:42px;gap:28px;
  backdrop-filter:blur(8px);z-index:100;
}
.stat{display:flex;align-items:baseline;gap:6px}
.stat-v{font-family:var(--font-head);font-size:16px;font-weight:700;color:#4a9de0}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
#legend{margin-left:auto;display:flex;gap:14px;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* MAP elements */
.country-path{fill:#10223a;stroke:#1a3550;stroke-width:.3}
.graticule{fill:none;stroke:#0d1e30;stroke-width:.3}
.sphere{fill:#07111f}
.conn-line{stroke-dasharray:5,4;fill:none;opacity:.35}
.port-dot{cursor:pointer;transition:r .15s}
.port-dot:hover{r:5}
.office-marker{cursor:pointer}
.office-marker circle.outer{opacity:.12}
.office-pulse{animation:pulse 2.5s ease-out infinite}
@keyframes pulse{0%{opacity:.6}100%{opacity:0;r:20}}
.dimmed{opacity:.15}
.highlighted{}

/* TOOLTIP */
#map-tooltip{
  position:absolute;background:rgba(9,24,40,0.95);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;pointer-events:none;opacity:0;
  transition:opacity .15s;font-size:12px;white-space:nowrap;z-index:60;
}
#map-tooltip.show{opacity:1}
#map-tooltip .tt-name{font-weight:500;color:#e8f4ff;margin-bottom:2px}
#map-tooltip .tt-office{font-size:10px;color:var(--muted)}
</style>
</head>

  {name:"Warri Port",country:"Nigeria",coords:[5.75,5.52],office:"gh"},
  {name:"Abidjan Port",country:"Ivory Coast",coords:[-4.02,5.35],office:"gh"},
  {name:"Lomé Port",country:"Togo",coords:[1.23,6.13],office:"gh"},
  {name:"Cotonou Port",country:"Benin",coords:[2.43,6.35],office:"gh"},
  {name:"Dakar Port",country:"Senegal",coords:[-17.44,14.67],office:"gh"},
  {name:"Conakry Port",country:"Guinea",coords:[-13.7,9.52],office:"gh"},
  {name:"Douala Port",country:"Cameroon",coords:[9.7,4.05],office:"gh"},
  {name:"Libreville Port",country:"Gabon",coords:[9.45,0.39],office:"gh"},
  {name:"Pointe-Noire",country:"Congo",coords:[11.86,-4.78],office:"gh"},
  {name:"Luanda Port",country:"Angola",coords:[13.23,-8.84],office:"gh"},
  {name:"Walvis Bay",country:"Namibia",coords:[14.51,-22.96],office:"gh"},
  {name:"Durban Port",country:"South Africa",coords:[31.03,-29.87],office:"gh"},
  {name:"Cape Town Port",country:"South Africa",coords:[18.42,-33.9],office:"gh"},
];

const ROUTES = [["uae","sg"],["uae","in"],["uae","no"],["uae","gh"],["sg","in"],["no","gh"]];

let activeFilter = "all";
let selectedItem = null;
const svg = d3.select("#world-svg");
const mapWrap = document.getElementById("map-wrap");

function getSize(){
  return {w: mapWrap.clientWidth, h: mapWrap.clientHeight};
}

let {w, h} = getSize();
svg.attr("viewBox",`0 0 ${w} ${h}`).attr("width",w).attr("height",h);

const proj = d3.geoNaturalEarth1().scale(w/6).translate([w/2, h/2+20]);
const geoPath = d3.geoPath(proj);

const zoom = d3.zoom().scaleExtent([1,8]).on("zoom", e => {
  mapG.attr("transform", e.transform);
});
svg.call(zoom);

const mapG = svg.append("g");

const tooltip = document.getElementById("map-tooltip");

function showTooltip(e, name, office){
  tooltip.querySelector(".tt-name").textContent = name;
  tooltip.querySelector(".tt-office").textContent = "Served by: " + OFFICES[office].short;
  tooltip.querySelector(".tt-office").style.color = OFFICES[office].color;
  tooltip.classList.add("show");
}
function moveTooltip(e){
  const r = mapWrap.getBoundingClientRect();
  let x = e.clientX - r.left + 14;
  let y = e.clientY - r.top - 36;
  if(x+200 > w) x = e.clientX - r.left - 210;
  tooltip.style.left = x+"px";
  tooltip.style.top = y+"px";
}
function hideTooltip(){ tooltip.classList.remove("show"); }

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world => {
  mapG.append("path").datum({type:"Sphere"}).attr("class","sphere").attr("d",geoPath);
  mapG.append("path")
    .datum(d3.geoGraticule()())
    .attr("class","graticule").attr("d",geoPath);
  mapG.append("g").selectAll("path")
    .data(topojson.feature(world, world.objects.countries).features)
    .join("path").attr("class","country-path").attr("d",geoPath);

  const routeG = mapG.append("g").attr("class","routes");
  ROUTES.forEach(([a,b]) => {
    const pa = proj(OFFICES[a].coords);
    const pb = proj(OFFICES[b].coords);
    const mx=(pa[0]+pb[0])/2, my=(pa[1]+pb[1])/2 - Math.abs(pa[0]-pb[0])*0.15;
    routeG.append("path")
      .attr("class","conn-line")
      .attr("stroke", OFFICES[a].color)
      .attr("d",`M${pa[0]},${pa[1]} Q${mx},${my} ${pb[0]},${pb[1]}`);
  });

  const portG = mapG.append("g").attr("class","ports-layer");
  PORTS.forEach(p => {
    const [x,y] = proj(p.coords);
    const o = OFFICES[p.office];
    portG.append("circle")
      .attr("class","port-dot")
      .attr("data-id", p.name)
      .attr("data-office", p.office)
      .attr("cx",x).attr("cy",y).attr("r",3.5)
      .attr("fill", o.color).attr("opacity",.7)
      .attr("stroke","rgba(0,0,0,0.4)").attr("stroke-width",.5)
      .on("mouseenter", (e) => { showTooltip(e, p.name + " — " + p.country, p.office); })
      .on("mousemove", moveTooltip)
      .on("mouseleave", hideTooltip)
      .on("click", () => selectPort(p));
  });

  const officeG = mapG.append("g").attr("class","offices-layer");
  Object.values(OFFICES).forEach(o => {
    const [x,y] = proj(o.coords);
    const g = officeG.append("g")
      .attr("class","office-marker")
      .attr("data-id", o.id)
      .attr("transform",`translate(${x},${y})`);

    g.append("circle").attr("class","office-pulse")
      .attr("r",8).attr("fill",o.color).attr("opacity",.15);
    g.append("circle").attr("class","outer")
      .attr("r",13).attr("fill",o.color);
    g.append("circle")
      .attr("r",10).attr("fill","#091828").attr("stroke",o.color).attr("stroke-width",2);
    g.append("circle").attr("r",4).attr("fill",o.color);

    if(o.hq){
      g.append("text").attr("x",0).attr("y",-17)
        .attr("text-anchor","middle").attr("font-size","8")
        .attr("fill","#feca57").attr("font-family","Barlow Condensed, sans-serif")
        .attr("font-weight","600").text("★ HQ");
    }

    const lx = x > w*0.72 ? -16 : 16;
    const anchor = x > w*0.72 ? "end" : "start";
    g.append("text")
      .attr("x",lx).attr("y", o.hq ? -3 : 4)
      .attr("text-anchor",anchor).attr("font-size","9.5")
      .attr("fill",o.color).attr("font-family","Barlow Condensed, sans-serif")
      .attr("font-weight","600").text(o.name);

    g.on("mouseenter", (e) => {
      showTooltip(e, o.name, o.id);
      tooltip.querySelector(".tt-office").textContent = o.role;
    })
    .on("mousemove", moveTooltip)
    .on("mouseleave", hideTooltip)
    .on("click", () => selectOffice(o.id));
  });

  buildPortList(PORTS);
  document.getElementById("port-stat").textContent = PORTS.length;
  document.getElementById("port-count").textContent = `${PORTS.length} ports across ${[...new Set(PORTS.map(p=>p.country))].length} countries`;
});

function buildPortList(ports){
  const list = document.getElementById("port-list");
  list.innerHTML = "";
  ports.forEach(p => {
    const o = OFFICES[p.office];
    const div = document.createElement("div");
    div.className = "port-item";
    div.dataset.name = p.name;
    div.innerHTML = `
      <div class="pi-dot" style="background:${o.color}"></div>
      <div class="pi-info">
        <div class="pi-name">${p.name}</div>
        <div class="pi-office">${p.country} · ${o.short}</div>
      </div>
      <div class="pi-badge" style="background:${o.color}18;color:${o.color};border:0.5px solid ${o.color}44">${o.short}</div>
    `;
    div.addEventListener("click", () => selectPort(p));
    list.appendChild(div);
  });
}

function selectPort(p){
  selectedItem = {type:"port", data:p};
  const o = OFFICES[p.office];
  const dp = document.getElementById("detail-panel");
  document.getElementById("dp-color-bar").style.background = o.color;
  document.getElementById("dp-title").textContent = p.name;
  document.getElementById("dp-subtitle").textContent = p.country;
  document.getElementById("dp-type").textContent = "Port";
  document.getElementById("dp-type").style.cssText = `background:${o.color}20;color:${o.color};border:0.5px solid ${o.color}44;font-size:11px;padding:3px 9px;border-radius:4px;display:inline-block;margin-bottom:12px;font-weight:500`;
  document.getElementById("dp-body").innerHTML = `<strong style="color:${o.color}">${o.name}</strong> is the designated OceanShield office serving this port.<br><br>Region: ${o.region}`;
  document.getElementById("dp-services").innerHTML = `<div class="ds-label">Services available at this port</div>${o.services.map(s=>`<span class="svc-tag">${s}</span>`).join("")}`;
  document.getElementById("dp-ports-section").style.display = "none";
  dp.classList.add("visible");

  document.querySelectorAll(".port-item").forEach(el => {
    el.classList.toggle("active", el.dataset.name === p.name);
  });
  zoomTo(p.coords);
}

function selectOffice(id){
  selectedItem = {type:"office", id};
  const o = OFFICES[id];
  const portsByOffice = PORTS.filter(p=>p.office===id);
  const dp = document.getElementById("detail-panel");
  document.getElementById("dp-color-bar").style.background = o.color;
  document.getElementById("dp-title").textContent = o.name + (o.hq ? " ★" : "");
  document.getElementById("dp-title").style.color = o.color;
  document.getElementById("dp-subtitle").textContent = o.role;
  document.getElementById("dp-type").textContent = o.hq ? "Global HQ" : "Regional Office";
  document.getElementById("dp-type").style.cssText = `background:${o.color}20;color:${o.color};border:0.5px solid ${o.color}44;font-size:11px;padding:3px 9px;border-radius:4px;display:inline-block;margin-bottom:12px;font-weight:500`;
  document.getElementById("dp-body").innerHTML = `Coverage: <span style="color:${o.color}">${o.region}</span>`;
  document.getElementById("dp-services").innerHTML = `<div class="ds-label">Services offered</div>${o.services.map(s=>`<span class="svc-tag">${s}</span>`).join("")}`;
  document.getElementById("dp-ports-section").style.display = "block";
  document.getElementById("dp-ports-list").innerHTML = portsByOffice.map(p=>`<div style="display:flex;align-items:center;gap:6px"><div style="width:5px;height:5px;border-radius:50%;background:${o.color};flex-shrink:0"></div>${p.name}, ${p.country}</div>`).join("");
  dp.classList.add("visible");

  setFilter(id);
  zoomTo(o.coords, 3);
}

function zoomTo(coords, scale){
  const [x,y] = proj(coords);
  const s = scale || 4;
  svg.transition().duration(700).call(
    zoom.transform,
    d3.zoomIdentity.translate(w/2 - s*x, h/2 - s*y).scale(s)
  );
}

function setFilter(id){
  activeFilter = id;
  document.querySelectorAll(".fbtn").forEach(b => {
    b.classList.toggle("active", b.dataset.id === id);
  });
  d3.selectAll(".port-dot").classed("dimmed", function(){
    if(id==="all") return false;
    return this.getAttribute("data-office") !== id;
  });
  d3.selectAll(".office-marker").classed("dimmed", function(){
    if(id==="all") return false;
    return this.getAttribute("data-id") !== id;
  });
  d3.selectAll(".conn-line").classed("dimmed", id !== "all");

  const filtered = id==="all" ? PORTS : PORTS.filter(p=>p.office===id);
  buildPortList(filtered);
  document.getElementById("port-count").textContent = `${filtered.length} ports${id!=="all"?" for "+OFFICES[id].short:""} across ${[...new Set(filtered.map(p=>p.country))].length} countries`;
}

document.querySelectorAll(".fbtn").forEach(btn => {
  btn.addEventListener("click", () => {
    const id = btn.dataset.id;
    if(id === activeFilter && id !== "all") { setFilter("all"); return; }
    setFilter(id);
    if(id !== "all") selectOffice(id);
    else { document.getElementById("detail-panel").classList.remove("visible"); }
  });
});

document.getElementById("reset-btn").addEventListener("click", () => {
  setFilter("all");
  selectedItem = null;
  document.getElementById("detail-panel").classList.remove("visible");
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
});

document.getElementById("dp-close").addEventListener("click", () => {
  document.getElementById("detail-panel").classList.remove("visible");
  selectedItem = null;
  document.querySelectorAll(".port-item").forEach(el => el.classList.remove("active"));
});

document.getElementById("search-input").addEventListener("input", function(){
  const q = this.value.toLowerCase();
  const base = activeFilter==="all" ? PORTS : PORTS.filter(p=>p.office===activeFilter);
  const filtered = q ? base.filter(p => p.name.toLowerCase().includes(q) || p.country.toLowerCase().includes(q)) : base;
  buildPortList(filtered);
});

window.addEventListener("resize", () => {
  const s = getSize();
  w = s.w; h = s.h;
  svg.attr("viewBox",`0 0 ${w} ${h}`).attr("width",w).attr("height",h);
  proj.scale(w/6).translate([w/2, h/2+20]);
});
</script>
</body>
</html>
